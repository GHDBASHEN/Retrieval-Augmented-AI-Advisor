version: '3.8'

services:
  db:
    image: postgres:15-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: rag_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://rag_user:secretpassword@db:5432/rag_platform
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX_NAME=rag-bots
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build: ./frontend
    restart: always
    ports:
      - "8080:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://40.90.226.80:8000
    depends_on:
      - backend

volumes:
  postgres_data: